<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PickBot — Your Pickleball Buddy in Delhi NCR</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏓</text></svg>" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#fdf4ff',
                100: '#fae8ff',
                500: '#a855f7',
                600: '#9333ea',
                700: '#7e22ce',
              },
              court: {
                green: '#22c55e',
                yellow: '#eab308',
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-in-out',
              'slide-up': 'slideUp 0.3s ease-out',
              'pulse-dot': 'pulseDot 1.4s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              slideUp: { '0%': { transform: 'translateY(10px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
              pulseDot: { '0%, 80%, 100%': { transform: 'scale(0)', opacity: '0.5' }, '40%': { transform: 'scale(1)', opacity: '1' } },
            }
          }
        }
      }
    </script>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .chat-scroll { scroll-behavior: smooth; }
      .chat-scroll::-webkit-scrollbar { width: 4px; }
      .chat-scroll::-webkit-scrollbar-track { background: transparent; }
      .chat-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
      .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: #9333ea; display: inline-block; margin: 0 2px; animation: pulseDot 1.4s ease-in-out infinite; }
      .typing-dot:nth-child(2) { animation-delay: 0.2s; }
      .typing-dot:nth-child(3) { animation-delay: 0.4s; }
      .quick-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(147,51,234,0.2); }
      .quick-btn { transition: all 0.15s ease; }
      .court-card { transition: all 0.2s ease; }
      .court-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
      @keyframes pulseDot {
        0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body class="bg-gray-50 h-screen flex flex-col">
    <div id="root" class="flex flex-col h-screen"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
